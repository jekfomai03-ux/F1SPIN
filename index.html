<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>F1 Club — Розыгрыш игрового времени</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="case-container">
    <div class="header">
        <h1>F1 Club — Case Opening</h1>
        <p>★ Открой контейнер и выиграй бесплатное игровое время ★</p>
    </div>

    <div class="case-visual">
        <div class="case-icon" id="caseIcon">📦</div>
    </div>

    <div class="roulette-wrapper">
        <div class="roulette-indicator"></div>
        <div class="roulette-viewport" id="rouletteViewport">
            <div class="roulette-track" id="rouletteTrack"></div>
        </div>
    </div>

    <div class="result-panel">
        <div class="result-title" id="resultTitle">Нажмите «Открыть кейс»</div>
        <div class="result-prize" id="resultPrize"></div>
    </div>

    <button class="open-btn" id="openCaseBtn">🔓 Открыть кейс</button>

    <div class="info-strip">
        <span>🎲 Розыгрыш пакетов игрового времени</span>
        <span class="badge">Джекпот — 24 часа</span>
    </div>

    <div class="prizes-legend" id="prizesLegend"></div>
</div>

<script src="script.js"></script>
</body>
</html>
